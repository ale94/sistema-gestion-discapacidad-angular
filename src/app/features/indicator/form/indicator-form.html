<form
  [formGroup]="personForm"
  (ngSubmit)="onSubmit()"
  class="flex flex-col w-full max-w-5xl max-h-[90vh] rounded-lg overflow-hidden"
>
  <div class="p-6 border-b border-slate-200">
    <h2 class="text-xl font-semibold text-slate-900">
      {{ isEditMode ? 'Editar Persona' : 'Agregar Nueva Persona' }}
    </h2>
  </div>

  <div class="p-6 grow overflow-y-auto bg-slate-50">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="lg:col-span-1">
        <label class="form-label">Apellido</label>
        <input formControlName="lastName" type="text" class="form-input" />
      </div>
      <div class="lg:col-span-1">
        <label class="form-label">Nombre</label>
        <input formControlName="firstName" type="text" class="form-input" />
      </div>
      <div class="lg:col-span-1">
        <label class="form-label">D.N.I</label>
        <input formControlName="dni" type="text" class="form-input" />
      </div>
      <div class="lg:col-span-1">
        <label class="form-label">Telefono</label>
        <input formControlName="phone" type="text" class="form-input" />
      </div>
      <div class="lg:col-span-2">
        <label class="form-label">Dirección</label>
        <input formControlName="address" type="text" class="form-input" />
      </div>

      <div class="lg:col-span-3">
        <label class="form-label">Tipo de Indicador</label>

        <textarea formControlName="indicatorType" class="form-input" rows="3" maxlength="200">
        </textarea>

        <div
          class="text-sm text-right mt-1"
          [class.text-red-500]="(personForm.get('indicatorType')?.value?.length || 0) > 180"
        >
          {{ personForm.get('indicatorType')?.value?.length || 0 }}/200 caracteres
        </div>
      </div>
    </div>
  </div>

  <div class="p-4 bg-white border-t border-slate-200 flex justify-end space-x-4">
    <button
      type="button"
      (click)="onCancel()"
      class="px-6 py-2 rounded-lg text-slate-700 bg-white hover:bg-slate-100 transition-colors border border-slate-300"
    >
      Cancelar
    </button>
    <button
      type="submit"
      [disabled]="personForm.invalid"
      class="px-6 py-2 rounded-lg text-white bg-teal-600 hover:bg-teal-700 disabled:bg-slate-400 disabled:cursor-not-allowed transition-colors"
    >
      Guardar
    </button>
  </div>
</form>
