<div class="container mx-auto">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
    <h1 class="text-2xl sm:text-3xl md:text-3xl font-bold text-slate-900">Gestión de Préstamos</h1>
    <button
      (click)="openAddModal()"
      class="flex items-center bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 px-4 rounded-lg transition-all duration-300 transform hover:scale-105 shadow-lg"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5 mr-2"
        viewBox="0 0 20 20"
        fill="currentColor"
      >
        <path
          fill-rule="evenodd"
          d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"
          clip-rule="evenodd"
        />
      </svg>
      Nuevo Préstamo
    </button>
  </div>

  <div>
    <input
      type="text"
      [ngModel]="searchTerm()"
      (ngModelChange)="onSearchChange($event)"
      placeholder="Buscar nombre, apellido, DNI"
      class="w-full px-4 py-2 bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 text-slate-900"
    />
  </div>

  <!-- TABLA -->
  <div class="w-full mx-auto py-4">
    <div class="bg-white shadow-sm border border-gray-200 rounded-lg overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">
                Fecha de Solicitud
              </th>

              <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">
                Vencimiento
              </th>

              <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">
                Tipo
              </th>

              <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">
                N° de equipo
              </th>

              <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Año</th>

              <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">
                Obra social
              </th>

              <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">
                Solicitante
              </th>

              <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">
                D.N.I
              </th>
              <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">
                Dirección
              </th>
              <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">
                Telefono
              </th>
              <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">
                Fecha de devolución
              </th>

              <th class="px-6 py-3 text-right text-xs font-semibold text-gray-500 uppercase">
                Acciones
              </th>
            </tr>
          </thead>

          <tbody class="bg-white divide-y divide-gray-200">
            @for (e of equipments(); track e.code) {
              <tr class="hover:bg-gray-50 transition-colors">
                <td class="px-6 py-4 text-sm font-medium text-gray-900">
                  {{ e.code }}
                </td>

                <td class="px-6 py-4 text-sm text-gray-600">
                  {{ e.description }}
                </td>

                <td class="px-6 py-4 text-sm text-gray-600">
                  {{ e.totalStock }}
                </td>

                <td class="px-6 py-4 text-sm text-gray-600">
                  {{ e.totalAvailable }}
                </td>

                <td class="px-6 py-4">
                  <span
                    class="px-2.5 py-0.5 rounded-full text-xs font-medium"
                    [ngClass]="{
                      'bg-green-100 text-green-800': e.status === 'DISPONIBLE',
                      'bg-blue-100 text-blue-800': e.status === 'PRESTADO',
                      'bg-amber-100 text-amber-800': e.status === 'REPARACION',
                    }"
                  >
                    {{ e.status }}
                  </span>
                </td>

                <td class="px-6 py-4 text-right flex justify-end gap-3">
                  <!-- EDITAR -->
                  <button
                    type="button"
                    (click)="editEquipment(e)"
                    class="text-teal-600 hover:text-teal-900"
                  >
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
                      />
                    </svg>
                  </button>

                  <!-- BORRAR -->
                  <button
                    type="button"
                    (click)="deleteEquipment(e.code)"
                    class="text-red-600 hover:text-red-900"
                  >
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                      />
                    </svg>
                  </button>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
