<div class="container mx-auto">
  <!-- HEADER -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8 gap-4">
    <div>
      <h1 class="text-2xl md:text-3xl font-bold text-slate-900">Inventario de Equipos</h1>
    </div>
  </div>

  <!-- FORMULARIO -->
  <form [formGroup]="form" class="bg-white shadow-sm border border-gray-200 rounded-lg p-6 mb-8">
    <div class="grid md:grid-cols-3 gap-4">
      <!-- Descripción -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"> Descripción </label>

        <input
          formControlName="description"
          placeholder="Ej: Silla de ruedas"
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-sm"
        />
      </div>

      <!-- Stock -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1"> Stock Total </label>

        <input
          type="number"
          formControlName="totalStock"
          placeholder="Ej: 10"
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-sm"
        />
      </div>

      <!-- Botones -->
      <div class="flex items-end gap-3">
        @if (!editingCode) {
          <button
            type="button"
            (click)="createEquipment()"
            class="inline-flex items-center px-4 py-2 text-sm font-medium text-white bg-teal-600 rounded-md hover:bg-teal-700 focus:ring-2 focus:ring-teal-500"
          >
            Crear
          </button>
        }

        @if (editingCode) {
          <button
            type="button"
            (click)="updateEquipment()"
            class="inline-flex items-center px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:ring-2 focus:ring-blue-500"
          >
            Actualizar
          </button>

          <button
            type="button"
            (click)="cancelEdit()"
            class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50"
          >
            Cancelar
          </button>
        }
      </div>
    </div>
  </form>

  <!-- TABLA -->
  <div class="bg-white shadow-sm border border-gray-200 rounded-lg overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">
              Código
            </th>

            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">
              Descripción
            </th>

            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Stock</th>

            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">
              Disponible
            </th>

            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">
              Estado
            </th>

            <th class="px-6 py-3 text-right text-xs font-semibold text-gray-500 uppercase">
              Acciones
            </th>
          </tr>
        </thead>

        <tbody class="bg-white divide-y divide-gray-200">
          @for (e of equipments(); track e.code) {
            <tr class="hover:bg-gray-50 transition-colors">
              <td class="px-6 py-4 text-sm font-medium text-gray-900">
                {{ e.code }}
              </td>

              <td class="px-6 py-4 text-sm text-gray-600">
                {{ e.description }}
              </td>

              <td class="px-6 py-4 text-sm text-gray-600">
                {{ e.totalStock }}
              </td>

              <td class="px-6 py-4 text-sm text-gray-600">
                {{ e.totalAvailable }}
              </td>

              <td class="px-6 py-4">
                <span
                  class="px-2.5 py-0.5 rounded-full text-xs font-medium"
                  [ngClass]="{
                    'bg-green-100 text-green-800': e.status === 'DISPONIBLE',
                    'bg-blue-100 text-blue-800': e.status === 'PRESTADO',
                    'bg-amber-100 text-amber-800': e.status === 'REPARACION',
                  }"
                >
                  {{ e.status }}
                </span>
              </td>

              <td class="px-6 py-4 text-right flex justify-end gap-3">
                <!-- EDITAR -->
                <button
                  type="button"
                  (click)="editEquipment(e)"
                  class="text-teal-600 hover:text-teal-900"
                >
                  <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
                    />
                  </svg>
                </button>

                <!-- BORRAR -->
                <button
                  type="button"
                  (click)="deleteEquipment(e.code)"
                  class="text-red-600 hover:text-red-900"
                >
                  <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                    />
                  </svg>
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
