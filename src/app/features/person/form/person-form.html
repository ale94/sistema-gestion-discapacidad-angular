<form
  [formGroup]="personForm"
  (ngSubmit)="onSubmit()"
  class="flex flex-col w-full max-w-5xl max-h-[90vh] rounded-lg overflow-hidden"
>
  <div class="p-6 border-b border-slate-200">
    <h2 class="text-xl font-semibold text-slate-900">
      {{ isEditMode ? 'Editar Persona' : 'Agregar Nueva Persona' }}
    </h2>
  </div>

  <div class="p-6 grow overflow-y-auto bg-slate-50">
    <!-- DATOS DE LA PERSONA -->
    <fieldset class="lg:col-span-3 border border-slate-300 rounded-lg p-4 mb-4 bg-white">
      <legend class="px-2 text-md font-semibold text-slate-700">1. Datos de la Persona</legend>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-2">
        <div>
          <input formControlName="lastName" type="text" class="form-input" placeholder="Apellido" />
        </div>
        <div>
          <input
            formControlName="firstName"
            clear
            type="text"
            class="form-input"
            placeholder="Nombre"
          />
        </div>
        <div>
          <input formControlName="dni" type="text" class="form-input" placeholder="D.N.I" />
        </div>
        <div>
          <label class="form-label">Fecha de Nacimiento</label>
          <input formControlName="dateBirth" type="date" class="form-input" />
        </div>
        <div>
          <label class="form-label">Sexo</label>
          <select formControlName="gender" class="form-input">
            @for (gender of genders; track gender) {
              <option [value]="gender">{{ gender }}</option>
            }
          </select>
        </div>
        <div>
          <label class="form-label">Estado Civil</label>
          <select formControlName="civilStatus" class="form-input">
            @for (type of civilStatuses; track type) {
              <option [value]="type">{{ type }}</option>
            }
          </select>
        </div>
        <div>
          <input formControlName="phone" type="text" class="form-input" placeholder="Teléfono" />
        </div>
        <div>
          <input
            formControlName="tutor"
            type="text"
            class="form-input"
            placeholder="Nombre del Tutor"
          />
        </div>

        <div>
          <input formControlName="district" type="text" class="form-input" placeholder="Barrio" />
        </div>
        <div>
          <input formControlName="street" type="text" class="form-input" placeholder="Calle" />
        </div>
        <div>
          <input
            formControlName="locality"
            type="text"
            class="form-input"
            placeholder="Localidad"
          />
        </div>
        <div>
          <input
            formControlName="province"
            type="text"
            class="form-input"
            placeholder="Provincia"
          />
        </div>
      </div>
    </fieldset>

    <!-- GRUPO FAMILIAR -->
    <fieldset
      formArrayName="familyMembers"
      class="lg:col-span-3 border border-slate-300 rounded-lg p-4 mb-4 bg-white"
    >
      <legend class="px-2 text-md font-semibold text-slate-700">2. Grupo Familiar</legend>

      @for (familiar of familyMembers.controls; track $index; let i = $index) {
        <div [formGroupName]="i" class="grid grid-cols-8 gap-2 py-2">
          <input formControlName="lastName" placeholder="Apellido" class="form-input" />
          <input formControlName="firstName" placeholder="Nombre" class="form-input" />
          <input formControlName="dni" placeholder="DNI" class="form-input" />
          <input formControlName="age" type="number" placeholder="Edad" class="form-input" />
          <input formControlName="civilStatus" placeholder="Estado Civil" class="form-input" />
          <input formControlName="parentage" placeholder="Parentesco" class="form-input" />
          <input formControlName="occupation" placeholder="Ocupación" class="form-input" />

          <button type="button" (click)="removeFamily(i)">X</button>
        </div>
      }

      <button
        type="button"
        (click)="addFamily()"
        class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 px-4 rounded"
      >
        + Agregar Familiar
      </button>
    </fieldset>

    <!-- SITUACION DE SALUD -->
    <fieldset class="lg:col-span-3 border border-slate-300 rounded-lg p-4 mb-4 bg-white">
      <legend class="px-2 text-md font-semibold text-slate-700">3. Situación de Salud</legend>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-2">
        <div class="lg:col-span-2">
          <label class="form-label">Diagnóstico</label>
          <input
            formControlName="diagnostic"
            type="text"
            class="form-input"
            placeholder="Ingrese el diagnóstico"
          />
        </div>

        <div>
          <label class="form-label">Tipo de Discapacidad</label>
          <select formControlName="disabilityType" class="form-input">
            @for (type of disabilityTypes; track type) {
              <option [value]="type">{{ type }}</option>
            }
          </select>
        </div>

        <div>
          <label class="form-label">Número CUD</label>
          <input
            formControlName="cudNumber"
            type="text"
            class="form-input"
            placeholder="Ingrese el CUD"
          />
        </div>

        <div>
          <label class="form-label">¿CUD vigente?</label>
          <select formControlName="activeCud" class="form-input">
            <option value="true">Si</option>
            <option value="false">No</option>
          </select>
        </div>

        <div>
          <label class="form-label">¿Realiza tratamiento/rehabilitación?</label>
          <select formControlName="rehabilitationTreatment" class="form-input">
            <option value="true">Si</option>
            <option value="false">No</option>
          </select>
        </div>
      </div>
    </fieldset>

    <!-- SITUACION LABORAL -->
    <fieldset class="lg:col-span-3 border border-slate-300 rounded-lg p-4 mb-4 bg-white">
      <legend class="px-2 text-md font-semibold text-slate-700">4. Situación Laboral</legend>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-2">
        <div>
          <label class="form-label">Situación Laboral</label>
          <select formControlName="employmentStatus" class="form-input">
            @for (status of jobStatuses; track status) {
              <option [value]="status">{{ status }}</option>
            }
          </select>
        </div>
        <div>
          <label class="form-label">Nombre</label>
          <input
            formControlName="companyName"
            type="text"
            class="form-input"
            placeholder="Nombre de la Empresa"
          />
        </div>
        <div>
          <label class="form-label">Direccion</label>
          <input
            formControlName="workAddress"
            type="text"
            class="form-input"
            placeholder="Dirección de la Empresa"
          />
        </div>
        <div>
          <label class="form-label">Obra Social</label>
          <select formControlName="socialWork" class="form-input">
            <option value="true">Si</option>
            <option value="false">No</option>
          </select>
        </div>
        <div class="lg:col-span-2">
          <label class="form-label">Nombre</label>
          <input
            formControlName="nameSocialWork"
            type="text"
            class="form-input"
            placeholder="Nombre de la Obra Social"
          />
        </div>
      </div>
    </fieldset>

    <!-- SITUACION DE EDUCACION -->
    <fieldset class="lg:col-span-3 border border-slate-300 rounded-lg p-4 mb-4 bg-white">
      <legend class="px-2 text-md font-semibold text-slate-700">5. Situación de Educación</legend>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-2">
        <div>
          <label class="form-label">Nivel Educativo</label>
          <select formControlName="educationLevel" class="form-input">
            @for (level of educationLevels; track level) {
              <option [value]="level">{{ level }}</option>
            }
          </select>
        </div>
        <div>
          <label class="form-label">Nombre</label>
          <input
            formControlName="schoolName"
            type="text"
            class="form-input"
            placeholder="Nombre de la Escuela"
          />
        </div>
        <div>
          <label class="form-label">Direccion</label>
          <input
            formControlName="educationAddress"
            type="text"
            class="form-input"
            placeholder="Dirección de la Escuela"
          />
        </div>
      </div>
    </fieldset>

    <!-- BENEFICIOS -->
    <fieldset class="lg:col-span-3 border border-slate-300 rounded-lg p-4 mb-4 bg-white">
      <legend class="px-2 text-md font-semibold text-slate-700">6. Beneficios</legend>

      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mt-2">
        <div class="flex items-center">
          <input formControlName="auh" type="checkbox" class="form-checkbox" />
          <label class="ml-2 text-sm text-slate-700">AUH</label>
        </div>

        <div class="flex items-center">
          <input formControlName="federalProgram" type="checkbox" class="form-checkbox" />
          <label class="ml-2 text-sm text-slate-700">Incluir Salud</label>
        </div>

        <div class="flex items-center">
          <input formControlName="pension" type="checkbox" class="form-checkbox" />
          <label class="ml-2 text-sm text-slate-700">Pensión</label>
        </div>

        <div class="flex items-center">
          <input formControlName="merchandise" type="checkbox" class="form-checkbox" />
          <label class="ml-2 text-sm text-slate-700">Bolsón de Mercadería</label>
        </div>

        <div class="flex items-center">
          <input formControlName="freePass" type="checkbox" class="form-checkbox" />
          <label class="ml-2 text-sm text-slate-700">Pase Libre</label>
        </div>
      </div>
    </fieldset>
  </div>

  <div class="p-4 bg-white border-t border-slate-200 flex justify-end space-x-4">
    <button
      type="button"
      (click)="onCancel()"
      class="px-6 py-2 rounded-lg text-slate-700 bg-white hover:bg-slate-100 transition-colors border border-slate-300"
    >
      Cancelar
    </button>
    <button
      type="submit"
      [disabled]="personForm.invalid"
      class="px-6 py-2 rounded-lg text-white bg-teal-600 hover:bg-teal-700 disabled:bg-slate-400 disabled:cursor-not-allowed transition-colors"
    >
      Guardar
    </button>
  </div>
</form>
