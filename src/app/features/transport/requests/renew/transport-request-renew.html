<div class="bg-white rounded-t-2xl sm:rounded-xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[95vh] sm:max-h-[90vh]">
  <div class="px-4 sm:px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50 shrink-0">
    <h2 class="text-xl font-bold text-slate-800">Renovar Pase Libre</h2>
    <button (click)="cancel.emit()" class="text-slate-400 hover:text-slate-600 transition-colors">
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col flex-1 overflow-hidden">
    <div class="p-4 sm:p-6 overflow-y-auto custom-scrollbar flex-1 space-y-6">

      @if (checkDone() && foundPerson()) {
        <div class="p-4 rounded-xl flex items-center gap-3 border bg-green-50 border-green-200 text-green-800">
          <svg class="h-6 w-6 text-green-600 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <div>
            <p class="font-bold">Beneficiario Registrado</p>
            <p class="text-sm">El DNI se encuentra en el padrón de discapacidad.</p>
          </div>
        </div>
      }

      @if (checkDone() && !foundPerson()) {
        <div class="p-4 rounded-xl flex items-center gap-3 border bg-amber-50 border-amber-200 text-amber-800">
          <svg class="h-6 w-6 text-amber-600 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
          <div>
            <p class="font-bold">Beneficiario No Registrado</p>
            <p class="text-sm">El DNI no está en el padrón.</p>
          </div>
        </div>
      }

      @if (lookupError()) {
        <p class="text-amber-700 text-sm font-medium">{{ lookupError() }}</p>
      }

      <div class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">DNI</label>
          <div class="flex gap-2">
            <input type="text" formControlName="dni" class="w-full px-4 py-2 border border-slate-300 rounded-lg bg-white" placeholder="Ingrese DNI">
            <button type="button" (click)="lookupDni()" [disabled]="searching()" class="px-4 py-2 bg-slate-800 text-white rounded-lg hover:bg-slate-900 transition-colors font-medium disabled:opacity-50">
              {{ searching() ? 'Buscando...' : 'Buscar' }}
            </button>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Nombre</label>
          <input type="text" formControlName="firstName" class="w-full px-4 py-2 border border-slate-300 rounded-lg bg-slate-50 text-slate-800">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Apellido</label>
          <input type="text" formControlName="lastName" class="w-full px-4 py-2 border border-slate-300 rounded-lg bg-slate-50 text-slate-800">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Domicilio</label>
          <input type="text" formControlName="address" class="w-full px-4 py-2 border border-slate-300 rounded-lg bg-slate-50 text-slate-800">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Teléfono</label>
          <input type="tel" formControlName="phone" class="w-full px-4 py-2 border border-slate-300 rounded-lg bg-slate-50 text-slate-800">
        </div>
      </div>
    </div>

    <div class="px-4 sm:px-6 py-4 border-t border-slate-200 bg-slate-50 flex flex-col-reverse sm:flex-row justify-end gap-3 shrink-0">
      <button type="button" (click)="cancel.emit()" class="w-full sm:w-auto px-4 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 transition-colors font-medium text-center">
        Cancelar
      </button>
      <button type="submit" [disabled]="form.invalid" class="w-full sm:w-auto px-4 py-2.5 bg-teal-600 text-white rounded-lg hover:bg-teal-700 transition-colors font-medium disabled:opacity-50 disabled:cursor-not-allowed shadow-md text-center">
        Renovar
      </button>
    </div>
  </form>
</div>
