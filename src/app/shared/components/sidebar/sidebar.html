<div class="flex flex-col w-full h-full text-white bg-teal-700 border-r border-teal-800 shadow-xl">
  <div class="flex items-center justify-center h-20 border-b border-teal-600/50 shrink-0">
    <div class="flex flex-col items-center leading-tight">
      <div class="flex items-center">
        <div class="p-1 bg-white rounded-full">
          <img src="assets/logo.jpeg" alt="logo" class="h-8 w-8 rounded-full object-cover" />
        </div>
        <span class="ml-3 text-xl font-bold tracking-tight">SGD</span>
      </div>
      <span class="text-[10px] uppercase tracking-widest opacity-80 mt-1 font-semibold">Gestión de Discapacidad</span>
    </div>
  </div>

  <nav class="flex-1 px-3 py-4 overflow-y-auto custom-scrollbar space-y-1">

    <a (click)="LinkClicked()" routerLink="/dashboard" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }"
      class="flex items-center px-4 py-2.5 text-teal-100 hover:bg-teal-600 hover:text-white rounded-xl transition-all duration-200 group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80 group-hover:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
      </svg>
      <span class="ml-4 font-medium">Panel General</span>
    </a>

    <a (click)="LinkClicked()" routerLink="/personas" routerLinkActive="active-link"
      class="flex items-center px-4 py-2.5 text-teal-100 hover:bg-teal-600 hover:text-white rounded-xl transition-all duration-200 group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80 group-hover:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
      </svg>
      <span class="ml-4 font-medium">Personas Registradas</span>
    </a>

    <a (click)="LinkClicked()" routerLink="/seguimientos" routerLinkActive="active-link"
      class="flex items-center px-4 py-2.5 text-teal-100 hover:bg-teal-600 hover:text-white rounded-xl transition-all duration-200 group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80 group-hover:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
      </svg>
      <span class="ml-4 font-medium">Seguimientos</span>
    </a>

    <a (click)="LinkClicked()" routerLink="/graficos" routerLinkActive="active-link"
      class="flex items-center px-4 py-2.5 text-teal-100 hover:bg-teal-600 hover:text-white rounded-xl transition-all duration-200 group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80 group-hover:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
      </svg>
      <span class="ml-4 font-medium">Estadísticas</span>
    </a>

    <a (click)="LinkClicked()" routerLink="/prestamos" routerLinkActive="active-link"
      class="flex items-center px-4 py-2.5 text-teal-100 hover:bg-teal-600 hover:text-white rounded-xl transition-all duration-200 group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80 group-hover:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
      </svg>
      <span class="ml-4 font-medium">Préstamos</span>
    </a>

    <a (click)="LinkClicked()" routerLink="/transportes" routerLinkActive="active-link"
      class="flex items-center px-4 py-2.5 text-teal-100 hover:bg-teal-600 hover:text-white rounded-xl transition-all duration-200 group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80 group-hover:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
      </svg>
      <span class="ml-4 font-medium">Pase Libre</span>
    </a>

    <a (click)="LinkClicked()" routerLink="/eventos" routerLinkActive="active-link"
      class="flex items-center px-4 py-2.5 text-teal-100 hover:bg-teal-600 hover:text-white rounded-xl transition-all duration-200 group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80 group-hover:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
      <span class="ml-4 font-medium">Eventos</span>
    </a>

    <div class="pt-4 pb-2">
      <div class="border-t border-teal-600/30 mx-4"></div>
    </div>

    <a (click)="LinkClicked()" routerLink="/usuarios" routerLinkActive="active-link"
      class="flex items-center px-4 py-2.5 text-teal-100 hover:bg-teal-600 hover:text-white rounded-xl transition-all duration-200 group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80 group-hover:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
      <span class="ml-4 font-medium">Usuarios</span>
    </a>

    <a (click)="LinkClicked()" routerLink="/informacion" routerLinkActive="active-link"
      class="flex items-center px-4 py-2.5 text-teal-100 hover:bg-teal-600 hover:text-white rounded-xl transition-all duration-200 group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80 group-hover:opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span class="ml-4 font-medium">Info del Sistema</span>
    </a>
  </nav>

  <div class="p-4 bg-teal-800/40 border-t border-teal-600/50">
    <button (click)="logout()"
      class="w-full flex items-center px-4 py-2.5 text-teal-100 hover:bg-red-500 hover:text-white rounded-xl transition-all duration-200 group">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-transform group-hover:-translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      <span class="ml-4 font-medium text-sm">Cerrar Sesión</span>
    </button>
  </div>
</div>
